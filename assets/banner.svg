<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080C18"/>
      <stop offset="100%" style="stop-color:#0F1629"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4ECDC4"/>
      <stop offset="50%" style="stop-color:#44A3E0"/>
      <stop offset="100%" style="stop-color:#9B59B6"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4ECDC4;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)" rx="16"/>

  <!-- Glow blobs -->
  <circle cx="200" cy="140" r="200" fill="url(#glow1)" filter="url(#blur)"/>
  <circle cx="1000" cy="140" r="200" fill="url(#glow2)" filter="url(#blur)"/>

  <!-- Grid lines (subtle) -->
  <line x1="0" y1="70" x2="1200" y2="70" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="140" x2="1200" y2="140" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="900" y1="0" x2="900" y2="280" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Gradient accent bar at top -->
  <rect x="0" y="0" width="1200" height="3" rx="0" fill="url(#accent)"/>

  <!-- Left accent line -->
  <rect x="60" y="70" width="4" height="140" rx="2" fill="url(#accent)"/>

  <!-- Tag pill -->
  <rect x="80" y="70" width="180" height="26" rx="13" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.25)" stroke-width="1"/>
  <text x="92" y="87" font-family="'DM Sans', -apple-system, sans-serif" font-size="10" font-weight="600" fill="#4ECDC4" letter-spacing="1.5">⚡ ANALYTICS PLATFORM</text>

  <!-- Main title -->
  <text x="80" y="145" font-family="'DM Sans', -apple-system, sans-serif" font-size="52" font-weight="700" fill="#E2E8F0" letter-spacing="-1">RetailPulse</text>
  <text x="476" y="145" font-family="'DM Sans', -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    <tspan fill="url(#accent)"> 360</tspan>
  </text>

  <!-- Subtitle -->
  <text x="80" y="178" font-family="'DM Sans', -apple-system, sans-serif" font-size="16" fill="#718096" letter-spacing="0.3">Customer Churn &amp; Revenue Intelligence Platform</text>

  <!-- Stats row -->
  <text x="80" y="218" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#4A5568">Python · SQL · R · Power BI · Streamlit · AI Insights</text>

  <!-- Right side stats -->
  <!-- Stat 1 -->
  <rect x="800" y="75" width="140" height="56" rx="10" fill="rgba(255,107,107,0.07)" stroke="rgba(255,107,107,0.18)" stroke-width="1"/>
  <text x="820" y="96" font-family="'DM Sans', sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.2">CHURN RATE</text>
  <text x="820" y="120" font-family="'DM Mono', monospace" font-size="24" font-weight="700" fill="#FF6B6B">26.5%</text>

  <!-- Stat 2 -->
  <rect x="955" y="75" width="185" height="56" rx="10" fill="rgba(247,183,49,0.07)" stroke="rgba(247,183,49,0.18)" stroke-width="1"/>
  <text x="975" y="96" font-family="'DM Sans', sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.2">MONTHLY REV AT RISK</text>
  <text x="975" y="120" font-family="'DM Mono', monospace" font-size="24" font-weight="700" fill="#F7B731">$139K</text>

  <!-- Stat 3 -->
  <rect x="800" y="148" width="140" height="56" rx="10" fill="rgba(78,205,196,0.07)" stroke="rgba(78,205,196,0.18)" stroke-width="1"/>
  <text x="820" y="169" font-family="'DM Sans', sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.2">RETENTION RATE</text>
  <text x="820" y="193" font-family="'DM Mono', monospace" font-size="24" font-weight="700" fill="#4ECDC4">73.5%</text>

  <!-- Stat 4 -->
  <rect x="955" y="148" width="185" height="56" rx="10" fill="rgba(155,89,182,0.07)" stroke="rgba(155,89,182,0.18)" stroke-width="1"/>
  <text x="975" y="169" font-family="'DM Sans', sans-serif" font-size="9" font-weight="600" fill="#718096" letter-spacing="1.2">DATASET</text>
  <text x="975" y="193" font-family="'DM Mono', monospace" font-size="24" font-weight="700" fill="#9B59B6">7,043</text>

  <!-- Bottom tech stack chips -->
  <rect x="800" y="222" width="60" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="830" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Python</text>

  <rect x="870" y="222" width="40" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="890" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">SQL</text>

  <rect x="920" y="222" width="32" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="936" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">R</text>

  <rect x="962" y="222" width="65" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="994" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Power BI</text>

  <rect x="1037" y="222" width="62" height="22" rx="11" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="1068" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Streamlit</text>

  <rect x="1109" y="222" width="31" height="22" rx="11" fill="rgba(78,205,196,0.1)" stroke="rgba(78,205,196,0.2)" stroke-width="1"/>
  <text x="1124" y="237" font-family="'DM Sans', sans-serif" font-size="9" fill="#4ECDC4" text-anchor="middle">AI</text>

  <!-- Border -->
  <rect x="1" y="1" width="1198" height="278" rx="15" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
</svg>
